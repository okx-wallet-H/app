<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>海豚社区 - 行情</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── 搜索栏 ── */
        .search-bar {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255,255,255,0.7);
            border-radius: 20px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(45,27,105,0.06);
        }
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.9rem;
            color: #1C1C28;
            font-family: inherit;
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-icon { color: var(--text-muted); flex-shrink: 0; }
        .search-btn {
            flex-shrink: 0;
            background: linear-gradient(135deg, #2D1B69, var(--primary));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 7px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
        }
        .search-btn:active { opacity: 0.8; }
        .search-clear {
            flex-shrink: 0;
            font-size: 0.78rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
        }

        /* ── 分类 Tab ── */
        .market-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px;
        }
        .market-tabs::-webkit-scrollbar { display: none; }
        .market-tab {
            flex-shrink: 0;
            padding: 7px 16px;
            border-radius: 40px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.6);
            color: var(--text-muted);
            border: 1.5px solid rgba(255,255,255,0.7);
        }
        .market-tab.active {
            background: linear-gradient(135deg, #2D1B69, var(--primary));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(124,58,237,0.25);
        }
        .market-tab:active { transform: scale(0.95); }

        /* ── 链筛选按钮 ── */
        .chain-filter {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .chain-filter::-webkit-scrollbar { display: none; }
        .chain-btn {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.6);
            color: var(--text-muted);
            border: 1.5px solid rgba(255,255,255,0.7);
        }
        .chain-btn.active {
            background: #1C1C28;
            color: white;
            border-color: transparent;
        }
        .chain-btn:active { transform: scale(0.95); }
        .chain-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── 列表表头 ── */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px 10px;
            border-bottom: 1px solid rgba(124,58,237,0.08);
            margin-bottom: 4px;
        }
        .list-header-left {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .list-header-right {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-sep { color: rgba(100,116,139,0.3); }

        /* ── 代币行（参考截图：左侧图标+名称+成交额·市值，右侧价格+涨跌幅） ── */
        .token-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 4px;
            border-bottom: 1px solid rgba(124,58,237,0.05);
            cursor: pointer;
            transition: background 0.15s;
            border-radius: 16px;
            gap: 12px;
        }
        .token-row:active { background: rgba(124,58,237,0.05); }

        /* 左侧：图标 + 文字 */
        .token-row-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        .token-row-icon {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            background: rgba(124,58,237,0.08);
            position: relative;
        }
        .token-row-icon img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .token-row-icon .chain-badge {
            position: absolute;
            bottom: -2px; right: -2px;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #fff;
            border: 1.5px solid #fff;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .token-row-icon .chain-badge img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .token-row-icon-placeholder {
            font-size: 1.2rem;
            font-weight: 800;
            color: #7C3AED;
        }
        .token-row-meta { min-width: 0; }
        .token-row-name {
            font-size: 0.92rem;
            font-weight: 800;
            color: #2D1B69;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chain-tag {
            font-size: 0.58rem;
            background: rgba(124,58,237,0.1);
            color: #7C3AED;
            padding: 2px 5px;
            border-radius: 5px;
            font-weight: 600;
            flex-shrink: 0;
        }
        /* 成交额 · 市值 副标题 */
        .token-row-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .token-row-sub .sub-label {
            color: rgba(100,116,139,0.7);
            font-size: 0.65rem;
        }
        .token-row-sub .sub-sep {
            margin: 0 4px;
            color: rgba(100,116,139,0.35);
        }

        /* 右侧：价格 + 涨跌幅 */
        .token-row-right {
            text-align: right;
            flex-shrink: 0;
        }
        .token-row-price {
            font-size: 0.92rem;
            font-weight: 800;
            color: #1C1C28;
            font-family: 'SF Mono', 'Fira Code', monospace;
            white-space: nowrap;
        }
        .token-row-change {
            margin-top: 3px;
        }
        .change-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 800;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .change-badge.up { background: rgba(16,185,129,0.12); color: #10B981; }
        .change-badge.down { background: rgba(239,68,68,0.1); color: #EF4444; }
        .change-badge.flat { background: rgba(100,116,139,0.1); color: #64748B; }

        /* ── 市场概览卡片 ── */
        .market-overview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .overview-card {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 24px;
            padding: 14px 16px;
            box-shadow: 0 4px 16px rgba(45,27,105,0.06);
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .overview-icon {
            width: 34px; height: 34px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .overview-icon svg { width: 18px; height: 18px; }
        .overview-icon.hot { background: rgba(251,146,60,0.12); }
        .overview-icon.up { background: rgba(16,185,129,0.12); }
        .overview-icon.down { background: rgba(239,68,68,0.1); }
        .overview-icon.new { background: rgba(124,58,237,0.1); }
        .overview-body { min-width: 0; }
        .overview-label { font-size: 0.68rem; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
        .overview-value { font-size: 0.98rem; font-weight: 800; color: #2D1B69; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .overview-change { font-size: 0.7rem; font-weight: 700; margin-top: 2px; }
        .overview-change.positive { color: #10B981; }
        .overview-change.negative { color: #EF4444; }

        /* ── 涨跌榜横滑 ── */
        .gainer-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 4px;
        }
        .gainer-list::-webkit-scrollbar { display: none; }
        .gainer-card {
            flex-shrink: 0;
            width: 96px;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 20px;
            padding: 12px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .gainer-card:active { transform: scale(0.95); }
        .gainer-icon {
            width: 32px; height: 32px;
            border-radius: 50%;
            margin: 0 auto 5px;
            overflow: hidden;
            background: rgba(124,58,237,0.08);
            display: flex; align-items: center; justify-content: center;
        }
        .gainer-icon img { width: 100%; height: 100%; object-fit: cover; }
        .gainer-symbol { font-size: 0.78rem; font-weight: 800; color: #2D1B69; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gainer-change { font-size: 0.7rem; font-weight: 700; margin-top: 3px; }

        /* ── 加载状态 ── */
        .loading-placeholder {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .loading-spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(124,58,237,0.15);
            border-top-color: #7C3AED;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 详情弹层 ── */
        .detail-overlay {
            position: fixed; inset: 0;
            background: rgba(15,10,40,0.5);
            backdrop-filter: blur(8px);
            z-index: 300;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .detail-overlay.active { opacity: 1; pointer-events: auto; }
        .detail-sheet {
            position: fixed; bottom: 0; left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%; max-width: 500px;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(24px);
            border-radius: 32px 32px 0 0;
            padding: 24px 24px calc(32px + env(safe-area-inset-bottom));
            z-index: 301;
            transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
            max-height: 85vh;
            overflow-y: auto;
        }
        .detail-sheet.active { transform: translateX(-50%) translateY(0); }
        .sheet-handle {
            width: 40px; height: 4px;
            background: #E2E8F0;
            border-radius: 4px;
            margin: 0 auto 20px;
        }
        .detail-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }
        .detail-stat {
            background: rgba(124,58,237,0.05);
            border-radius: 16px;
            padding: 12px;
        }
        .detail-stat-label { font-size: 0.68rem; font-weight: 600; color: var(--text-muted); }
        .detail-stat-value { font-size: 0.88rem; font-weight: 800; color: #2D1B69; margin-top: 3px; word-break: break-all; }
        .detail-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        .holders-section { margin-top: 16px; }
        .holders-title { font-size: 0.82rem; font-weight: 800; color: #2D1B69; margin-bottom: 10px; }
        .holder-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(124,58,237,0.05);
            font-size: 0.75rem;
        }
        .holder-addr { font-family: monospace; color: #64748B; font-weight: 600; }
        .holder-pct { font-weight: 800; color: #2D1B69; }
        .trades-section { margin-top: 16px; }
        .trades-title { font-size: 0.82rem; font-weight: 800; color: #2D1B69; margin-bottom: 10px; }
        .trade-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(124,58,237,0.05);
            font-size: 0.72rem;
        }
        .trade-type { padding: 2px 8px; border-radius: 6px; font-weight: 800; font-size: 0.68rem; }
        .trade-type.buy { background: rgba(16,185,129,0.12); color: #10B981; }
        .trade-type.sell { background: rgba(239,68,68,0.1); color: #EF4444; }
        .trade-info { text-align: right; color: #64748B; }
        .trade-price { font-weight: 700; color: #1C1C28; }
        .detail-tabs { display: flex; gap: 6px; margin-top: 16px; }
        .detail-tab {
            flex: 1; text-align: center; padding: 8px;
            border-radius: 12px; font-size: 0.78rem; font-weight: 700;
            cursor: pointer; color: var(--text-muted); transition: all 0.2s;
            background: rgba(124,58,237,0.04);
        }
        .detail-tab.active {
            background: linear-gradient(135deg, #2D1B69, var(--primary));
            color: white;
        }
    </style>
</head>
<body>
<div class="ambient-bg"></div>
<div class="container">

    <div class="text-center" style="margin-bottom: 20px;">
        <h1 style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #2D1B69, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">行情中心</h1>
        <p style="color: var(--text-muted); font-weight: 500;">实时链上数据 · OKX Web3 API</p>
    </div>

    <!-- 搜索栏（含搜索按钮） -->
    <div class="search-bar">
        <span class="search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </span>
        <input type="text" id="searchInput" placeholder="搜索代币名称或合约地址..."
               oninput="handleSearchInput()"
               onkeydown="if(event.key==='Enter') triggerSearch()">
        <span class="search-clear" id="searchClearBtn" style="display:none;" onclick="clearSearch()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </span>
        <button class="search-btn" onclick="triggerSearch()">搜索</button>
    </div>

    <!-- 市场概览（SVG 图标） -->
    <div class="market-overview" id="marketOverview">
        <div class="overview-card">
            <div class="overview-icon hot">
                <svg viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2c0 6-6 8-6 14a6 6 0 0 0 12 0c0-6-6-8-6-14z"/>
                    <path d="M12 12c0 3-2 4-2 6a2 2 0 0 0 4 0c0-2-2-3-2-6z"/>
                </svg>
            </div>
            <div class="overview-body">
                <div class="overview-label">热门代币</div>
                <div class="overview-value" id="ovHotName">加载中...</div>
                <div class="overview-change positive" id="ovHotChange">--</div>
            </div>
        </div>
        <div class="overview-card">
            <div class="overview-icon up">
                <svg viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                    <polyline points="17 6 23 6 23 12"/>
                </svg>
            </div>
            <div class="overview-body">
                <div class="overview-label">涨幅最大</div>
                <div class="overview-value" id="ovGainerName">加载中...</div>
                <div class="overview-change positive" id="ovGainerChange">--</div>
            </div>
        </div>
        <div class="overview-card">
            <div class="overview-icon down">
                <svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/>
                    <polyline points="17 18 23 18 23 12"/>
                </svg>
            </div>
            <div class="overview-body">
                <div class="overview-label">跌幅最大</div>
                <div class="overview-value" id="ovLoserName">加载中...</div>
                <div class="overview-change negative" id="ovLoserChange">--</div>
            </div>
        </div>
        <div class="overview-card">
            <div class="overview-icon new">
                <svg viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="16"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
            </div>
            <div class="overview-body">
                <div class="overview-label">新上线</div>
                <div class="overview-value" id="ovNewName">加载中...</div>
                <div class="overview-change" id="ovNewChange">--</div>
            </div>
        </div>
    </div>

    <!-- 今日涨幅榜 -->
    <div class="section-header">
        <h3 style="display:flex;align-items:center;gap:7px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v3"/>
                <polyline points="21 15 16 20 11 15"/>
                <line x1="16" y1="20" x2="16" y2="10"/>
            </svg>
            今日涨幅榜
        </h3>
        <span class="badge">实时排名</span>
    </div>
    <div class="card" style="padding: 16px 16px 8px;">
        <div class="gainer-list" id="gainerList">
            <div class="loading-placeholder"><div class="loading-spinner"></div>加载中...</div>
        </div>
    </div>

    <!-- 分类 Tab（顺序：自选 / 热门 / 新币 / 成交量 / 涨幅榜 / 跌幅榜） -->
    <div class="market-tabs" id="marketTabs">
        <div class="market-tab" onclick="switchTab('watchlist', this)">自选</div>
        <div class="market-tab active" onclick="switchTab('hot', this)">热门</div>
        <div class="market-tab" onclick="switchTab('new', this)">新币</div>
        <div class="market-tab" onclick="switchTab('volume', this)">成交量</div>
        <div class="market-tab" onclick="switchTab('gainers', this)">涨幅榜</div>
        <div class="market-tab" onclick="switchTab('losers', this)">跌幅榜</div>
    </div>

    <!-- 链筛选按钮（全部 / X Layer / BNB） -->
    <div class="chain-filter" id="chainFilter">
        <div class="chain-btn active" onclick="switchChain('all', this)">全部</div>
        <div class="chain-btn" onclick="switchChain('196', this)">
            <span class="chain-dot" style="background:#1A73E8;"></span>X Layer
        </div>
        <div class="chain-btn" onclick="switchChain('56', this)">
            <span class="chain-dot" style="background:#F0B90B;"></span>BNB
        </div>
    </div>

    <!-- 列表表头（参考截图：左侧成交额·市值，右侧价格·涨跌幅） -->
    <div class="list-header" id="listHeader">
        <div class="list-header-left">
            <span>成交额</span>
            <span class="header-sep">|</span>
            <span>市值</span>
        </div>
        <div class="list-header-right">
            <span>价格</span>
            <span class="header-sep">|</span>
            <span>涨跌幅</span>
        </div>
    </div>

    <!-- 代币列表 -->
    <div id="tokenList">
        <div class="loading-placeholder"><div class="loading-spinner"></div>正在获取实时行情...</div>
    </div>

    <!-- 搜索结果区（默认隐藏） -->
    <div id="searchResults" style="display:none;"></div>

</div>

<!-- 详情弹层 -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:8px;">
        <div id="detailIcon" style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:rgba(124,58,237,0.1);overflow:hidden;">
            <img id="detailIconImg" src="" style="width:100%;height:100%;object-fit:cover;display:none;">
            <span id="detailIconText" style="font-weight:800;color:#7C3AED;">H</span>
        </div>
        <div style="flex:1;min-width:0;">
            <div id="detailSymbol" style="font-size:1.4rem;font-weight:800;color:#2D1B69;">--</div>

<script>
// ============================================================
// 状态管理
// ============================================================
let currentTab = 'hot';
let currentChain = 'all';   // 链筛选：'all' | '196' | '56'
let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
let currentDetailToken = null;
let allTokensData = [];
let searchTimeout = null;
let isWatched = false;

// ============================================================
// 价格格式化（修正版）
// 规则：小数点后 ≤4 个零 → 完整显示有效数字
//       小数点后 ≥5 个零 → 缩写下标方式
// ============================================================
function formatPriceFull(price) {
    const p = parseFloat(price);
    if (isNaN(p) || p === 0) return '--';
    if (p >= 1000) return '$' + p.toLocaleString('en-US', { maximumFractionDigits: 2 });
    if (p >= 1)    return '$' + p.toFixed(4);
    if (p >= 0.01) return '$' + p.toFixed(6);

    const str = p.toFixed(20);
    const afterDot = str.split('.')[1] || '';
    let zeros = 0;
    for (const c of afterDot) {
        if (c === '0') zeros++; else break;
    }
    const sig = afterDot.slice(zeros, zeros + 6);  // 取6位有效数字

    if (zeros <= 4) {
        // ≤4 个零：完整显示
        return '$0.' + '0'.repeat(zeros) + sig;
    } else {
        // ≥5 个零：缩写下标
        return `$0.0{${zeros}}${sig.slice(0, 4)}`;
    }
}

function formatPriceHtml(price) {
    const p = parseFloat(price);
    if (isNaN(p) || p === 0) return '--';
    if (p >= 1000) return '$' + p.toLocaleString('en-US', { maximumFractionDigits: 2 });
    if (p >= 1)    return '$' + p.toFixed(4);
    if (p >= 0.01) return '$' + p.toFixed(6);

    const str = p.toFixed(20);
    const afterDot = str.split('.')[1] || '';
    let zeros = 0;
    for (const c of afterDot) {
        if (c === '0') zeros++; else break;
    }
    const sig = afterDot.slice(zeros, zeros + 6);

    if (zeros <= 4) {
        return '$0.' + '0'.repeat(zeros) + sig;
    } else {
        return `$0.0<sub style="font-size:0.6em;opacity:0.7;">${zeros}</sub>${sig.slice(0, 4)}`;
    }
}

// ============================================================
// 初始化
// ============================================================
async function initMarket() {
    try {
        await loadTokenList();
        fillOverviewFromData(allTokensData);
        await loadGainers();
        loadOverviewCards();
    } catch(e) {
        console.error('initMarket error:', e);
    }
}

// ============================================================
// 概览卡片：从已加载数据填充
// ============================================================
function fillOverviewFromData(data) {
    if (!data || data.length === 0) return;
    const hot = data[0];
    document.getElementById('ovHotName').textContent = hot.tokenSymbol || '--';
    const hc = OKX_API.formatChange(hot.change);
    document.getElementById('ovHotChange').textContent = hc.text;
    document.getElementById('ovHotChange').className = 'overview-change ' + (parseFloat(hot.change) >= 0 ? 'positive' : 'negative');

    const sorted = [...data].sort((a, b) => parseFloat(b.change || 0) - parseFloat(a.change || 0));
    if (sorted.length > 0) {
        document.getElementById('ovGainerName').textContent = sorted[0].tokenSymbol || '--';
        document.getElementById('ovGainerChange').textContent = OKX_API.formatChange(sorted[0].change).text;
        document.getElementById('ovGainerChange').className = 'overview-change positive';
    }
    if (sorted.length > 1) {
        const loser = sorted[sorted.length - 1];
        document.getElementById('ovLoserName').textContent = loser.tokenSymbol || '--';
        document.getElementById('ovLoserChange').textContent = OKX_API.formatChange(loser.change).text;
        document.getElementById('ovLoserChange').className = 'overview-change negative';
    }
    if (data.length > 2) {
        const newToken = data[data.length - 1];
        document.getElementById('ovNewName').textContent = newToken.tokenSymbol || '--';
        document.getElementById('ovNewChange').textContent = OKX_API.formatChange(newToken.change).text;
        document.getElementById('ovNewChange').className = 'overview-change ' + (parseFloat(newToken.change) >= 0 ? 'positive' : 'negative');
    }
}

// ============================================================
// 概览卡片：异步加载真实数据
// ============================================================
async function loadOverviewCards() {
    try {
        const gainers = await OKX_API.getToplist({ chains: '196,56', sortBy: '2', timeFrame: '4' });
        if (gainers && gainers.length > 0) {
            document.getElementById('ovGainerName').textContent = gainers[0].tokenSymbol || '--';
            document.getElementById('ovGainerChange').textContent = OKX_API.formatChange(gainers[0].change).text;
            document.getElementById('ovGainerChange').className = 'overview-change positive';
        }
    } catch(e) {}

    try {
        const topData = await OKX_API.getToplist({ chains: '196,56', sortBy: '2', timeFrame: '4' });
        if (topData && topData.length > 0) {
            const sorted = [...topData].sort((a, b) => parseFloat(a.change || 0) - parseFloat(b.change || 0));
            const loser = sorted[0];
            document.getElementById('ovLoserName').textContent = loser.tokenSymbol || '--';
            document.getElementById('ovLoserChange').textContent = OKX_API.formatChange(loser.change).text;
            document.getElementById('ovLoserChange').className = 'overview-change negative';
        }
    } catch(e) {}

    try {
        const newTokens = await OKX_API.getRealHotTokens({ rankingType: '4', rankingTimeFrame: '1', chainIndex: '56' });
        if (newTokens && newTokens.length > 0) {
            document.getElementById('ovNewName').textContent = newTokens[0].tokenSymbol || '--';
            document.getElementById('ovNewChange').textContent = OKX_API.formatChange(newTokens[0].change).text;
            document.getElementById('ovNewChange').className = 'overview-change ' + (parseFloat(newTokens[0].change) >= 0 ? 'positive' : 'negative');
        }
    } catch(e) {}
}

// ============================================================
// 涨幅榜横滑区
// ============================================================
async function loadGainers() {
    const container = document.getElementById('gainerList');
    if (allTokensData && allTokensData.length > 0) {
        const sorted = [...allTokensData].sort((a, b) => parseFloat(b.change || 0) - parseFloat(a.change || 0));
        renderGainerCards(container, sorted.slice(0, 8));
    }
    try {
        const data = await OKX_API.getToplist({ chains: '196,56', sortBy: '2', timeFrame: '4' });
        if (data && data.length > 0) renderGainerCards(container, data.slice(0, 8));
    } catch(e) {}
}

function renderGainerCards(container, tokens) {
    container.innerHTML = '';
    tokens.forEach(t => {
        const change = OKX_API.formatChange(t.change);
        const div = document.createElement('div');
        div.className = 'gainer-card';
        const iconHtml = t.tokenLogoUrl
            ? `<img src="${t.tokenLogoUrl}" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=\\'font-size:1rem;font-weight:800;color:#7C3AED;\\'>${(t.tokenSymbol||'?')[0]}</span>'">`
            : `<span style="font-size:1rem;font-weight:800;color:#7C3AED;">${(t.tokenSymbol||'?')[0]}</span>`;
        div.innerHTML = `
            <div class="gainer-icon">${iconHtml}</div>
            <div class="gainer-symbol">${t.tokenSymbol || '--'}</div>
            <div class="gainer-change" style="color:${change.class === 'up' ? '#10B981' : '#EF4444'}">${change.text}</div>`;
        div.onclick = () => openDetail(t);
        container.appendChild(div);
    });
}

// ============================================================
// 代币列表（按 Tab + 链筛选）
// ============================================================
async function loadTokenList() {
    const container = document.getElementById('tokenList');
    container.innerHTML = '<div class="loading-placeholder"><div class="loading-spinner"></div>正在获取实时行情...</div>';

    // 链筛选参数
    const chains = currentChain === 'all' ? '196,56' : currentChain;
    const chainIndex = currentChain === 'all' ? undefined : currentChain;

    try {
        let data = null;

        if (currentTab === 'watchlist') {
            if (watchlist.length === 0) {
                container.innerHTML = '<div class="loading-placeholder">暂无自选代币<br><span style="font-size:0.75rem;color:var(--text-muted);">点击代币详情中的 ☆ 添加自选</span></div>';
                return;
            }
            const results = [];
            for (const symbol of watchlist) {
                const r = await OKX_API.searchTokens(symbol);
                if (r && r.length > 0) results.push(r[0]);
            }
            data = results;
        } else if (currentTab === 'hot') {
            // 热门：分别请求 X Layer(196) 和 BNB(56)，合并后只展示这两条链
            if (currentChain === 'all') {
                const [d196, d56] = await Promise.all([
                    OKX_API.getRealHotTokens({ rankingType: '4', rankingTimeFrame: '4', chainIndex: '196' }),
                    OKX_API.getRealHotTokens({ rankingType: '4', rankingTimeFrame: '4', chainIndex: '56' })
                ]);
                const list196 = (d196 || []).slice(0, 10);
                const list56  = (d56  || []).slice(0, 10);
                // 交叉合并：196 和 56 各取前10，交替排列
                data = [];
                const maxLen = Math.max(list196.length, list56.length);
                for (let i = 0; i < maxLen; i++) {
                    if (i < list196.length) data.push(list196[i]);
                    if (i < list56.length)  data.push(list56[i]);
                }
            } else {
                // 单链筛选：只请求该链
                data = await OKX_API.getRealHotTokens({
                    rankingType: '4', rankingTimeFrame: '4', chainIndex
                });
            }
        } else if (currentTab === 'new') {
            // 新币：分别请求 X Layer(196) 和 BNB(56)，合并后只展示这两条链
            if (currentChain === 'all') {
                const [d196, d56] = await Promise.all([
                    OKX_API.getRealHotTokens({ rankingType: '4', rankingTimeFrame: '1', chainIndex: '196' }),
                    OKX_API.getRealHotTokens({ rankingType: '4', rankingTimeFrame: '1', chainIndex: '56' })
                ]);
                const list196 = (d196 || []).slice(0, 10);
                const list56  = (d56  || []).slice(0, 10);
                data = [];
                const maxLen = Math.max(list196.length, list56.length);
                for (let i = 0; i < maxLen; i++) {
                    if (i < list196.length) data.push(list196[i]);
                    if (i < list56.length)  data.push(list56[i]);
                }
            } else {
                data = await OKX_API.getRealHotTokens({
                    rankingType: '4', rankingTimeFrame: '1', chainIndex
                });
            }
        } else if (currentTab === 'gainers') {
            data = await OKX_API.getToplist({ chains, sortBy: '2', timeFrame: '4' });
        } else if (currentTab === 'losers') {
            const topData = await OKX_API.getToplist({ chains, sortBy: '2', timeFrame: '4' });
            data = topData ? [...topData].sort((a, b) => parseFloat(a.change || 0) - parseFloat(b.change || 0)) : null;
        } else if (currentTab === 'volume') {
            data = await OKX_API.getToplist({ chains, sortBy: '5', timeFrame: '4' });
        } else {
            // 兜底：同样只取 196 和 56
            if (currentChain === 'all') {
                const [d196, d56] = await Promise.all([
                    OKX_API.getRealHotTokens({ rankingType: '4', rankingTimeFrame: '4', chainIndex: '196' }),
                    OKX_API.getRealHotTokens({ rankingType: '4', rankingTimeFrame: '4', chainIndex: '56' })
                ]);
                data = [...(d196||[]).slice(0,10), ...(d56||[]).slice(0,10)];
            } else {
                data = await OKX_API.getRealHotTokens({ rankingType: '4', rankingTimeFrame: '4', chainIndex });
            }
        }

        if (!data || data.length === 0) {
            container.innerHTML = '<div class="loading-placeholder">暂无数据</div>';
            return;
        }

        allTokensData = data;
        renderTokenList(container, data);
    } catch(e) {
        console.error('加载代币列表失败:', e);
        container.innerHTML = '<div class="loading-placeholder">加载失败，请稍后重试</div>';
    }
}

// ============================================================
// 渲染代币列表（参考截图排版）
// 左：图标 + 代币名 + 成交额·市值
// 右：价格 + 涨跌幅
// ============================================================
function renderTokenList(container, tokens) {
    if (typeof container === 'string') container = document.getElementById(container);
    container.innerHTML = '';

    if (!tokens || tokens.length === 0) {
        container.innerHTML = '<div class="loading-placeholder">暂无匹配代币</div>';
        return;
    }

    tokens.forEach((t, idx) => {
        const price = formatPriceFull(t.price);
        const change = OKX_API.formatChange(t.change);
        const vol = OKX_API.formatVolume(t.volume24H || t.volume);
        const mcap = OKX_API.formatMarketCap(t.marketCap);
        const chainName = OKX_API.getChainName(t.chainIndex);

        // 图标：有 logo 用 img，否则用首字母
        const iconHtml = t.tokenLogoUrl
            ? `<img src="${t.tokenLogoUrl}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="token-row-icon-placeholder" style="display:none;">${(t.tokenSymbol||'?')[0]}</span>`
            : `<span class="token-row-icon-placeholder">${(t.tokenSymbol||'?')[0]}</span>`;

        // 副标题：成交额 · 市值（参考截图格式）
        const subHtml = `
            <span class="sub-label">成交额</span> ${vol}
            <span class="sub-sep">•</span>
            <span class="sub-label">市值</span> ${mcap}`;

        const div = document.createElement('div');
        div.className = 'token-row';
        div.innerHTML = `
            <div class="token-row-left">
                <div class="token-row-icon">${iconHtml}</div>
                <div class="token-row-meta">
                    <div class="token-row-name">
                        ${t.tokenSymbol || '--'}
                        <span class="chain-tag">${chainName}</span>
                    </div>
                    <div class="token-row-sub">${subHtml}</div>
                </div>
            </div>
            <div class="token-row-right">
                <div class="token-row-price">${price}</div>
                <div class="token-row-change">
                    <span class="change-badge ${change.class}">${change.text}</span>
                </div>
            </div>`;
        div.onclick = () => openDetail(t);
        container.appendChild(div);
    });
}

// ============================================================
// Tab 切换
// ============================================================
function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.market-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('tokenList').style.display = '';
    // 自选 tab 隐藏链筛选
    document.getElementById('chainFilter').style.display = tab === 'watchlist' ? 'none' : '';
    document.getElementById('listHeader').style.display = tab === 'watchlist' ? 'none' : '';
    loadTokenList();
}

// ============================================================
// 链筛选切换
// ============================================================
function switchChain(chain, el) {
    currentChain = chain;
    document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    loadTokenList();
}

// ============================================================
// 搜索（输入时显示清除按钮，点击按钮或回车触发）
// ============================================================
function handleSearchInput() {
    const q = document.getElementById('searchInput').value;
    document.getElementById('searchClearBtn').style.display = q ? '' : 'none';
    // 输入为空时恢复列表
    if (!q.trim()) {
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('tokenList').style.display = '';
        document.getElementById('listHeader').style.display = '';
    }
}

function triggerSearch() {
    clearTimeout(searchTimeout);
    const q = document.getElementById('searchInput').value.trim();
    if (!q) {
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('tokenList').style.display = '';
        return;
    }
    doSearch(q);
}

async function doSearch(q) {
    const container = document.getElementById('searchResults');
    container.style.display = '';
    document.getElementById('tokenList').style.display = 'none';
    document.getElementById('listHeader').style.display = 'none';
    container.innerHTML = '<div class="loading-placeholder"><div class="loading-spinner"></div>搜索中...</div>';

    try {
        const results = await OKX_API.searchTokens(q, '196,1,56');
        if (!results || results.length === 0) {
            container.innerHTML = '<div class="loading-placeholder">未找到匹配的代币</div>';
            return;
        }
        // 显示表头
        document.getElementById('listHeader').style.display = '';
        renderTokenList(container, results);
    } catch(e) {
        container.innerHTML = '<div class="loading-placeholder">搜索失败，请重试</div>';
    }
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClearBtn').style.display = 'none';
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('tokenList').style.display = '';
    document.getElementById('listHeader').style.display = '';
}

// ============================================================
// 详情弹层
// ============================================================
async function openDetail(token) {
    currentDetailToken = token;
    const addr = token.tokenContractAddress;
    const chain = token.chainIndex || '196';

    const iconImg = document.getElementById('detailIconImg');
    const iconText = document.getElementById('detailIconText');
    if (token.tokenLogoUrl) {
        iconImg.src = token.tokenLogoUrl;
        iconImg.style.display = '';
        iconText.style.display = 'none';
    } else {
        iconImg.style.display = 'none';
        iconText.style.display = '';
        iconText.textContent = (token.tokenSymbol || '?')[0];
    }

    document.getElementById('detailSymbol').textContent = token.tokenSymbol || '--';
    document.getElementById('detailName').textContent = token.tokenName || token.tokenFullName || '--';
    document.getElementById('detailPrice').innerHTML = formatPriceHtml(token.price);

    const change = OKX_API.formatChange(token.change);
    const chgEl = document.getElementById('detailChange');
    chgEl.textContent = change.text;
    chgEl.className = 'change-badge ' + change.class;

    document.getElementById('detailVol').textContent = OKX_API.formatVolume(token.volume24H || token.volume || '0');
    document.getElementById('detailMcap').textContent = OKX_API.formatMarketCap(token.marketCap || '0');
    document.getElementById('detailChain').textContent = OKX_API.getChainName(chain);
    document.getElementById('detailHolders').textContent = token.holders ? OKX_API.formatHolders(token.holders) : '--';
    document.getElementById('detailHigh').textContent = '--';
    document.getElementById('detailLow').textContent = '--';

    // 自选状态（SVG 星形）
    isWatched = watchlist.includes(token.tokenSymbol);
    updateStarIcon();

    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.detail-tab').classList.add('active');
    document.getElementById('holdersSection').style.display = '';
    document.getElementById('tradesSection').style.display = 'none';
    document.getElementById('holdersSection').innerHTML = '<div class="loading-placeholder" style="padding:20px;"><div class="loading-spinner"></div>加载持有者数据...</div>';
    document.getElementById('tradesSection').innerHTML = '<div class="loading-placeholder" style="padding:20px;"><div class="loading-spinner"></div>加载交易活动...</div>';

    document.getElementById('detailOverlay').classList.add('active');
    document.getElementById('detailSheet').classList.add('active');

    if (addr) loadDetailData(addr, chain);
}

function updateStarIcon() {
    const svg = document.getElementById('detailStarSvg');
    if (isWatched) {
        svg.setAttribute('fill', '#7C3AED');
        svg.setAttribute('stroke', '#7C3AED');
    } else {
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor');
    }
}

async function loadDetailData(addr, chain) {
    try {
        const [priceInfo, holders, trades] = await Promise.all([
            OKX_API.getTokenPriceInfo(addr, chain),
            OKX_API.getTokenHolders(addr, chain),
            OKX_API.getTokenTrades(addr, chain, 20)
        ]);

        if (priceInfo) {
            document.getElementById('detailPrice').innerHTML = formatPriceHtml(priceInfo.price);
            document.getElementById('detailVol').textContent = OKX_API.formatVolume(priceInfo.volume24H || '0');
            document.getElementById('detailMcap').textContent = OKX_API.formatMarketCap(priceInfo.marketCap || '0');
            document.getElementById('detailHolders').textContent = OKX_API.formatHolders(priceInfo.holders || '0');
            document.getElementById('detailHigh').textContent = formatPriceFull(priceInfo.maxPrice || '0');
            document.getElementById('detailLow').textContent = formatPriceFull(priceInfo.minPrice || '0');

            const change24 = OKX_API.formatChange(priceInfo.priceChange24H);
            const chgEl = document.getElementById('detailChange');
            chgEl.textContent = change24.text + ' 24h';
            chgEl.className = 'change-badge ' + change24.class;
        }

        renderHolders(holders);
        renderTrades(trades);
    } catch(e) {
        console.error('加载详情失败:', e);
    }
}

function renderHolders(holders) {
    const container = document.getElementById('holdersSection');
    if (!holders || holders.length === 0) {
        container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:0.78rem;">暂无持有者数据</div>';
        return;
    }
    let html = '<div class="holders-title">Top 持有者</div>';
    holders.slice(0, 10).forEach((h, i) => {
        const addr = OKX_API.shortAddress(h.holderWalletAddress);
        const pct = parseFloat(h.holdPercent || 0).toFixed(2);
        const tag = h.tag ? `<span style="font-size:0.6rem;background:rgba(124,58,237,0.1);color:#7C3AED;padding:1px 5px;border-radius:4px;margin-left:4px;">${h.tag}</span>` : '';
        html += `<div class="holder-row"><div><span style="color:#94A3B8;font-size:0.68rem;margin-right:6px;">#${i+1}</span><span class="holder-addr">${addr}</span>${tag}</div><span class="holder-pct">${pct}%</span></div>`;
    });
    container.innerHTML = html;
}

function renderTrades(trades) {
    const container = document.getElementById('tradesSection');
    if (!trades || trades.length === 0) {
        container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:0.78rem;">暂无交易活动</div>';
        return;
    }
    let html = '<div class="trades-title">最近交易</div>';
    trades.slice(0, 15).forEach(t => {
        const isBuy = (t.type || '').toLowerCase() === 'buy';
        html += `<div class="trade-row"><div style="display:flex;align-items:center;gap:8px;"><span class="trade-type ${isBuy?'buy':'sell'}">${isBuy?'买入':'卖出'}</span><span class="trade-price">${formatPriceFull(t.price)}</span></div><div class="trade-info"><div>${OKX_API.formatVolume(t.volume)}</div><div style="font-size:0.65rem;">${t.dexName||'--'} · ${OKX_API.formatTime(t.tradeTime)}</div></div></div>`;
    });
    container.innerHTML = html;
}

// ============================================================
// 详情 Tab 切换
// ============================================================
function switchDetailTab(tab, el) {
    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('holdersSection').style.display = tab === 'holders' ? '' : 'none';
    document.getElementById('tradesSection').style.display = tab === 'trades' ? '' : 'none';
}

function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('active');
    document.getElementById('detailSheet').classList.remove('active');
}

function toggleWatchlist() {
    if (!currentDetailToken) return;
    const symbol = currentDetailToken.tokenSymbol;
    const idx = watchlist.indexOf(symbol);
    if (idx >= 0) {
        watchlist.splice(idx, 1);
        isWatched = false;
    } else {
        watchlist.push(symbol);
        isWatched = true;
    }
    localStorage.setItem('watchlist', JSON.stringify(watchlist));
    updateStarIcon();
}

// ============================================================
// 启动
// ============================================================
initMarket();

// 每 60 秒自动刷新
setInterval(() => {
    if (currentTab !== 'watchlist') loadTokenList();
    loadOverviewCards();
}, 60000);
</script>
</body>
</html>
