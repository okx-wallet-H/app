<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>海豚社区 - 行情</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* 搜索栏 */
        .search-bar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(45, 27, 105, 0.06);
        }
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.9rem;
            color: #1C1C28;
            font-family: inherit;
        }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-icon { font-size: 1rem; color: var(--text-muted); }

        /* 分类 Tab */
        .market-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px;
        }
        .market-tabs::-webkit-scrollbar { display: none; }
        .market-tab {
            flex-shrink: 0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text-muted);
            border: 1.5px solid rgba(255, 255, 255, 0.7);
        }
        .market-tab.active {
            background: linear-gradient(135deg, #2D1B69, var(--primary));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
        }
        .market-tab:active { transform: scale(0.95); }

        /* 排序行 */
        .sort-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 8px;
            padding: 0 4px 10px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.08);
            margin-bottom: 8px;
        }
        .sort-col {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .sort-col:last-child { justify-content: flex-end; }
        .sort-col.active { color: var(--primary); }

        /* 代币行 */
        .token-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 8px;
            padding: 14px 4px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.05);
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
            border-radius: 16px;
        }
        .token-row:active { background: rgba(124, 58, 237, 0.05); }
        .token-row-info { display: flex; align-items: center; gap: 12px; }
        .token-row-icon {
            width: 42px; height: 42px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            overflow: hidden;
            background: rgba(124,58,237,0.08);
        }
        .token-row-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
        .token-row-name { font-size: 0.9rem; font-weight: 800; color: #2D1B69; }
        .token-row-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
        .token-row-price {
            font-size: 0.85rem; font-weight: 700; color: #1C1C28;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .token-row-price-sub { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
        .token-row-change { text-align: right; }
        .change-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.78rem;
            font-weight: 800;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .change-badge.up { background: rgba(16, 185, 129, 0.12); color: #10B981; }
        .change-badge.down { background: rgba(239, 68, 68, 0.1); color: #EF4444; }
        .change-badge.flat { background: rgba(100, 116, 139, 0.1); color: #64748B; }

        /* 市场概览卡片 */
        .market-overview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .overview-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(45, 27, 105, 0.06);
        }
        .overview-label { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
        .overview-value { font-size: 1.05rem; font-weight: 800; color: #2D1B69; }
        .overview-change { font-size: 0.72rem; font-weight: 700; margin-top: 3px; }
        .overview-change.positive { color: #10B981; }
        .overview-change.negative { color: #EF4444; }

        /* 涨跌榜 */
        .gainer-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 4px;
        }
        .gainer-list::-webkit-scrollbar { display: none; }
        .gainer-card {
            flex-shrink: 0;
            width: 100px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 12px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .gainer-card:active { transform: scale(0.95); }
        .gainer-icon { width: 32px; height: 32px; border-radius: 10px; margin: 0 auto 4px; overflow: hidden; }
        .gainer-icon img { width: 100%; height: 100%; object-fit: cover; }
        .gainer-symbol { font-size: 0.8rem; font-weight: 800; color: #2D1B69; }
        .gainer-change { font-size: 0.72rem; font-weight: 700; margin-top: 3px; }

        /* 加载状态 */
        .loading-placeholder {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .loading-spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(124,58,237,0.15);
            border-top-color: #7C3AED;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 搜索结果高亮 */
        .search-result-chain {
            font-size: 0.6rem;
            background: rgba(124,58,237,0.1);
            color: #7C3AED;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 600;
            margin-left: 6px;
        }

        /* 详情弹层 */
        .detail-overlay {
            position: fixed; inset: 0;
            background: rgba(15, 10, 40, 0.5);
            backdrop-filter: blur(8px);
            z-index: 300;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .detail-overlay.active { opacity: 1; pointer-events: auto; }
        .detail-sheet {
            position: fixed; bottom: 0; left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%; max-width: 500px;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(24px);
            border-radius: 32px 32px 0 0;
            padding: 24px 24px calc(32px + env(safe-area-inset-bottom));
            z-index: 301;
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 85vh;
            overflow-y: auto;
        }
        .detail-sheet.active { transform: translateX(-50%) translateY(0); }
        .sheet-handle {
            width: 40px; height: 4px;
            background: #E2E8F0;
            border-radius: 4px;
            margin: 0 auto 20px;
        }
        .detail-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }
        .detail-stat {
            background: rgba(124, 58, 237, 0.05);
            border-radius: 16px;
            padding: 12px;
        }
        .detail-stat-label { font-size: 0.68rem; font-weight: 600; color: var(--text-muted); }
        .detail-stat-value { font-size: 0.88rem; font-weight: 800; color: #2D1B69; margin-top: 3px; word-break: break-all; }
        .detail-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        /* 持有者列表 */
        .holders-section { margin-top: 16px; }
        .holders-title { font-size: 0.82rem; font-weight: 800; color: #2D1B69; margin-bottom: 10px; }
        .holder-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(124,58,237,0.05);
            font-size: 0.75rem;
        }
        .holder-addr { font-family: monospace; color: #64748B; font-weight: 600; }
        .holder-pct { font-weight: 800; color: #2D1B69; }

        /* 交易活动 */
        .trades-section { margin-top: 16px; }
        .trades-title { font-size: 0.82rem; font-weight: 800; color: #2D1B69; margin-bottom: 10px; }
        .trade-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(124,58,237,0.05);
            font-size: 0.72rem;
        }
        .trade-type {
            padding: 2px 8px; border-radius: 6px; font-weight: 800; font-size: 0.68rem;
        }
        .trade-type.buy { background: rgba(16,185,129,0.12); color: #10B981; }
        .trade-type.sell { background: rgba(239,68,68,0.1); color: #EF4444; }
        .trade-info { text-align: right; color: #64748B; }
        .trade-price { font-weight: 700; color: #1C1C28; }

        /* Tab 切换 */
        .detail-tabs {
            display: flex; gap: 6px; margin-top: 16px;
        }
        .detail-tab {
            flex: 1; text-align: center; padding: 8px;
            border-radius: 12px; font-size: 0.78rem; font-weight: 700;
            cursor: pointer; color: var(--text-muted); transition: all 0.2s;
            background: rgba(124,58,237,0.04);
        }
        .detail-tab.active {
            background: linear-gradient(135deg, #2D1B69, var(--primary));
            color: white;
        }
    </style>
</head>
<body>
<div class="ambient-bg"></div>
<div class="container">

    <div class="text-center" style="margin-bottom: 20px;">
        <h1 style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #2D1B69, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">行情中心</h1>
        <p style="color: var(--text-muted); font-weight: 500;">实时链上数据 · OKX Web3 API</p>
    </div>

    <!-- 搜索栏 -->
    <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索代币名称或合约地址..." oninput="handleSearch()">
        <span style="font-size:0.8rem; color:var(--primary); font-weight:700; cursor:pointer;" onclick="clearSearch()">清除</span>
    </div>

    <!-- 市场概览 -->
    <div class="market-overview" id="marketOverview">
        <div class="overview-card">
            <div class="overview-label">🔥 热门代币</div>
            <div class="overview-value" id="ovHotName">加载中...</div>
            <div class="overview-change positive" id="ovHotChange">--</div>
        </div>
        <div class="overview-card">
            <div class="overview-label">📈 涨幅最大</div>
            <div class="overview-value" id="ovGainerName">加载中...</div>
            <div class="overview-change positive" id="ovGainerChange">--</div>
        </div>
        <div class="overview-card">
            <div class="overview-label">📉 跌幅最大</div>
            <div class="overview-value" id="ovLoserName">加载中...</div>
            <div class="overview-change negative" id="ovLoserChange">--</div>
        </div>
        <div class="overview-card">
            <div class="overview-label">🆕 新上线</div>
            <div class="overview-value" id="ovNewName">加载中...</div>
            <div class="overview-change" id="ovNewChange">--</div>
        </div>
    </div>

    <!-- 今日涨幅榜 -->
    <div class="section-header"><h3>🚀 今日涨幅榜</h3><span class="badge">实时排名</span></div>
    <div class="card" style="padding: 16px 16px 8px;">
        <div class="gainer-list" id="gainerList">
            <div class="loading-placeholder"><div class="loading-spinner"></div>加载中...</div>
        </div>
    </div>

    <!-- 分类 Tab -->
    <div class="market-tabs" id="marketTabs">
        <div class="market-tab active" onclick="switchTab('hot', this)">热门</div>
        <div class="market-tab" onclick="switchTab('gainers', this)">涨幅榜</div>
        <div class="market-tab" onclick="switchTab('losers', this)">跌幅榜</div>
        <div class="market-tab" onclick="switchTab('volume', this)">成交量</div>
        <div class="market-tab" onclick="switchTab('new', this)">新币</div>
        <div class="market-tab" onclick="switchTab('watchlist', this)">⭐ 自选</div>
    </div>

    <!-- 排序行 -->
    <div class="sort-row">
        <div class="sort-col active">代币</div>
        <div class="sort-col">最新价</div>
        <div class="sort-col" style="justify-content:flex-end;">24h涨跌</div>
    </div>

    <!-- 代币列表 -->
    <div id="tokenList">
        <div class="loading-placeholder"><div class="loading-spinner"></div>正在获取实时行情...</div>
    </div>

    <!-- 搜索结果区（默认隐藏） -->
    <div id="searchResults" style="display:none;"></div>

</div>

<!-- 详情弹层 -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
<div class="detail-sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:8px;">
        <div id="detailIcon" style="width:48px;height:48px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;background:rgba(124,58,237,0.1);overflow:hidden;">
            <img id="detailIconImg" src="" style="width:100%;height:100%;object-fit:cover;display:none;">
            <span id="detailIconText">H</span>
        </div>
        <div style="flex:1;min-width:0;">
            <div id="detailSymbol" style="font-size:1.4rem;font-weight:800;color:#2D1B69;">--</div>
            <div id="detailName" style="font-size:0.78rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">--</div>
        </div>
        <div style="margin-left:auto;">
            <div id="detailStar" style="font-size:1.4rem;cursor:pointer;" onclick="toggleWatchlist()">☆</div>
        </div>
    </div>

    <div style="display:flex;align-items:baseline;gap:10px;">
        <div id="detailPrice" style="font-size:1.8rem;font-weight:800;color:#2D1B69;font-family:monospace;">--</div>
        <div id="detailChange" class="change-badge flat">--</div>
    </div>

    <!-- 基础统计 -->
    <div class="detail-stats" id="detailStats">
        <div class="detail-stat">
            <div class="detail-stat-label">24h 成交量</div>
            <div class="detail-stat-value" id="detailVol">--</div>
        </div>
        <div class="detail-stat">
            <div class="detail-stat-label">市值</div>
            <div class="detail-stat-value" id="detailMcap">--</div>
        </div>
        <div class="detail-stat">
            <div class="detail-stat-label">持有者数</div>
            <div class="detail-stat-value" id="detailHolders">--</div>
        </div>
        <div class="detail-stat">
            <div class="detail-stat-label">所在链</div>
            <div class="detail-stat-value" id="detailChain">--</div>
        </div>
        <div class="detail-stat">
            <div class="detail-stat-label">24h 最高</div>
            <div class="detail-stat-value" id="detailHigh">--</div>
        </div>
        <div class="detail-stat">
            <div class="detail-stat-label">24h 最低</div>
            <div class="detail-stat-value" id="detailLow">--</div>
        </div>
    </div>

    <!-- 详情 Tab -->
    <div class="detail-tabs">
        <div class="detail-tab active" onclick="switchDetailTab('holders', this)">持有者</div>
        <div class="detail-tab" onclick="switchDetailTab('trades', this)">交易活动</div>
    </div>

    <!-- 持有者列表 -->
    <div class="holders-section" id="holdersSection">
        <div class="loading-placeholder" style="padding:20px;"><div class="loading-spinner"></div>加载持有者数据...</div>
    </div>

    <!-- 交易活动 -->
    <div class="trades-section" id="tradesSection" style="display:none;">
        <div class="loading-placeholder" style="padding:20px;"><div class="loading-spinner"></div>加载交易活动...</div>
    </div>

    <!-- 操作按钮 -->
    <div class="detail-actions">
        <button class="btn-gradient" onclick="closeDetail(); window.location.href='trade.html'">买入</button>
        <button class="btn-outline" onclick="closeDetail(); window.location.href='trade.html'">卖出</button>
    </div>
</div>

<div class="bottom-nav" id="bottomNav"></div>

<script src="okx-api.js?v=20260325"></script>
<script src="common.js?v=20260325"></script>
<script src="nav.js"></script>
<script>
// ============================================================
// 状态管理
// ============================================================
let currentTab = 'hot';
let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
let currentDetailToken = null;
let allTokensData = [];     // 当前 tab 的代币列表
let searchTimeout = null;

// ============================================================
// 初始化
// ============================================================
async function initMarket() {
    try {
        // 第一步：加载热门代币列表（最重要）
        await loadTokenList();

        // 第二步：从已加载的数据中提取概览信息（无额外 API 请求）
        fillOverviewFromData(allTokensData);

        // 第三步：加载涨幅榜（单独一个 API 请求）
        await loadGainers();

        // 第四步：异步加载剩余概览卡片（涨幅/跌幅/新币）
        loadOverviewCards();
    } catch(e) {
        console.error('initMarket error:', e);
    }
}

// 从已加载的热门数据中填充概览卡片
function fillOverviewFromData(data) {
    if (!data || data.length === 0) return;
    // 热门代币 = 第一个
    const hot = data[0];
    document.getElementById('ovHotName').textContent = hot.tokenSymbol || '--';
    const hc = OKX_API.formatChange(hot.change);
    document.getElementById('ovHotChange').textContent = hc.text;
    document.getElementById('ovHotChange').className = 'overview-change ' + (parseFloat(hot.change) >= 0 ? 'positive' : 'negative');

    // 涨幅最大 = 按 change 降序排第一
    const sorted = [...data].sort((a, b) => parseFloat(b.change || 0) - parseFloat(a.change || 0));
    if (sorted.length > 0) {
        document.getElementById('ovGainerName').textContent = sorted[0].tokenSymbol || '--';
        const gc = OKX_API.formatChange(sorted[0].change);
        document.getElementById('ovGainerChange').textContent = gc.text;
        document.getElementById('ovGainerChange').className = 'overview-change positive';
    }

    // 跌幅最大 = 按 change 升序排第一
    if (sorted.length > 1) {
        const loser = sorted[sorted.length - 1];
        document.getElementById('ovLoserName').textContent = loser.tokenSymbol || '--';
        const lc = OKX_API.formatChange(loser.change);
        document.getElementById('ovLoserChange').textContent = lc.text;
        document.getElementById('ovLoserChange').className = 'overview-change negative';
    }

    // 新上线 = 暂时用最后一个代币
    if (data.length > 2) {
        const newToken = data[data.length - 1];
        document.getElementById('ovNewName').textContent = newToken.tokenSymbol || '--';
        const nc = OKX_API.formatChange(newToken.change);
        document.getElementById('ovNewChange').textContent = nc.text;
        document.getElementById('ovNewChange').className = 'overview-change ' + (parseFloat(newToken.change) >= 0 ? 'positive' : 'negative');
    }
}

// 异步加载真实的涨幅/跌幅/新币数据替换概览卡片
async function loadOverviewCards() {
    try {
        // 涨幅榜：使用 toplist API 按涨跌幅排序
        const gainers = await OKX_API.getToplist({ chains: '196,56', sortBy: '2', timeFrame: '4' });
        if (gainers && gainers.length > 0) {
            document.getElementById('ovGainerName').textContent = gainers[0].tokenSymbol || '--';
            const gc = OKX_API.formatChange(gainers[0].change);
            document.getElementById('ovGainerChange').textContent = gc.text;
            document.getElementById('ovGainerChange').className = 'overview-change positive';
        }
    } catch(e) {}

    try {
        // 跌幅榜：使用 toplist API 按涨跌幅排序，取末尾
        const topData = await OKX_API.getToplist({ chains: '196,56', sortBy: '2', timeFrame: '4' });
        if (topData && topData.length > 0) {
            const sorted = [...topData].sort((a, b) => parseFloat(a.change || 0) - parseFloat(b.change || 0));
            const loser = sorted[0];
            document.getElementById('ovLoserName').textContent = loser.tokenSymbol || '--';
            const lc = OKX_API.formatChange(loser.change);
            document.getElementById('ovLoserChange').textContent = lc.text;
            document.getElementById('ovLoserChange').className = 'overview-change negative';
        }
    } catch(e) {}

    try {
        // 新币：使用 hot-token API Trending 排序
        const newTokens = await OKX_API.getRealHotTokens({ rankingType: '4', rankingTimeFrame: '1', chainIndex: '56' });
        if (newTokens && newTokens.length > 0) {
            document.getElementById('ovNewName').textContent = newTokens[0].tokenSymbol || '--';
            const nc = OKX_API.formatChange(newTokens[0].change);
            document.getElementById('ovNewChange').textContent = nc.text;
            document.getElementById('ovNewChange').className = 'overview-change ' + (parseFloat(newTokens[0].change) >= 0 ? 'positive' : 'negative');
        }
    } catch(e) {}
}

// loadOverview 已被 fillOverviewFromData + loadOverviewCards 替代

// ============================================================
// 涨幅榜
// ============================================================
async function loadGainers() {
    const container = document.getElementById('gainerList');

    // 先从已有热门数据中提取涨幅榜（立即显示）
    if (allTokensData && allTokensData.length > 0) {
        const sorted = [...allTokensData].sort((a, b) => parseFloat(b.change || 0) - parseFloat(a.change || 0));
        renderGainerCards(container, sorted.slice(0, 8));
    }

    // 异步尝试获取真实涨幅榜数据替换（使用 toplist API）
    try {
        const data = await OKX_API.getToplist({ chains: '196,56', sortBy: '2', timeFrame: '4' });
        if (data && data.length > 0) {
            renderGainerCards(container, data.slice(0, 8));
        }
    } catch (e) {
        // 已有回退数据，忽略错误
    }
}

function renderGainerCards(container, tokens) {
    container.innerHTML = '';
    tokens.forEach(t => {
        const change = OKX_API.formatChange(t.change);
        const div = document.createElement('div');
        div.className = 'gainer-card';
        div.innerHTML = `
            <div class="gainer-icon">${t.tokenLogoUrl ? `<img src="${t.tokenLogoUrl}" onerror="this.parentElement.textContent='🪙'">` : '🪙'}</div>
            <div class="gainer-symbol">${t.tokenSymbol || '--'}</div>
            <div class="gainer-change" style="color:${change.class === 'up' ? '#10B981' : '#EF4444'}">${change.text}</div>
        `;
        div.onclick = () => openDetail(t);
        container.appendChild(div);
    });
}

// ============================================================
// 代币列表（按 Tab 切换）
// ============================================================
async function loadTokenList() {
    const container = document.getElementById('tokenList');
    container.innerHTML = '<div class="loading-placeholder"><div class="loading-spinner"></div>正在获取实时行情...</div>';

    try {
        let data = null;

        if (currentTab === 'watchlist') {
            // 自选列表
            if (watchlist.length === 0) {
                container.innerHTML = '<div class="loading-placeholder">暂无自选代币<br><span style="font-size:0.75rem;color:var(--text-muted);">点击代币详情中的 ⭐ 添加自选</span></div>';
                return;
            }
            // 搜索自选代币
            const results = [];
            for (const symbol of watchlist) {
                const r = await OKX_API.searchTokens(symbol);
                if (r && r.length > 0) results.push(r[0]);
            }
            data = results;
        } else {
            // 映射 tab 到 API 调用
            if (currentTab === 'hot') {
                // 热门：固定列表（X Layer + BSC）含实时价格和24h涨跌幅
                data = await OKX_API.getHotTokens({ chainIndex: 'all' });
            } else if (currentTab === 'gainers') {
                // 涨幅榜：v6 toplist API，按涨跌幅排序
                data = await OKX_API.getToplist({ chains: '196,56', sortBy: '2', timeFrame: '4' });
            } else if (currentTab === 'losers') {
                // 跌幅榜：v6 toplist API，按涨跌幅排序（取末尾）
                const topData = await OKX_API.getToplist({ chains: '196,56', sortBy: '2', timeFrame: '4' });
                data = topData ? [...topData].sort((a, b) => parseFloat(a.change || 0) - parseFloat(b.change || 0)) : null;
            } else if (currentTab === 'volume') {
                // 成交量榜：v6 toplist API，按成交量排序
                data = await OKX_API.getToplist({ chains: '196,56', sortBy: '5', timeFrame: '4' });
            } else if (currentTab === 'new') {
                // 新币榜：v6 hot-token API，Trending 排序
                data = await OKX_API.getRealHotTokens({ rankingType: '4', rankingTimeFrame: '4', chainIndex: '56' });
            } else {
                data = await OKX_API.getHotTokens({ chainIndex: 'all' });
            }
        }

        if (!data || data.length === 0) {
            container.innerHTML = '<div class="loading-placeholder">暂无数据</div>';
            return;
        }

        allTokensData = data;
        renderTokenList(data);
    } catch (e) {
        console.error('加载代币列表失败:', e);
        container.innerHTML = '<div class="loading-placeholder">加载失败，请稍后重试</div>';
    }
}

function renderTokenList(tokens) {
    const container = document.getElementById('tokenList');
    container.innerHTML = '';

    if (!tokens || tokens.length === 0) {
        container.innerHTML = '<div class="loading-placeholder">暂无匹配代币</div>';
        return;
    }

    tokens.forEach((t, idx) => {
        const price = OKX_API.formatPrice(t.price);
        const change = OKX_API.formatChange(t.change);
        const vol = OKX_API.formatVolume(t.volume24H || t.volume);
        const chainName = OKX_API.getChainName(t.chainIndex);

        const div = document.createElement('div');
        div.className = 'token-row';
        div.innerHTML = `
            <div class="token-row-info">
                <div class="token-row-icon">
                    ${t.tokenLogoUrl ? `<img src="${t.tokenLogoUrl}" onerror="this.style.display='none';this.parentElement.textContent='🪙'">` : '🪙'}
                </div>
                <div>
                    <div class="token-row-name">${t.tokenSymbol || '--'}<span class="search-result-chain">${chainName}</span></div>
                    <div class="token-row-sub">${t.tokenName || t.tokenFullName || '--'}</div>
                </div>
            </div>
            <div>
                <div class="token-row-price">${price}</div>
                <div class="token-row-price-sub">Vol: ${vol}</div>
            </div>
            <div class="token-row-change">
                <div class="change-badge ${change.class}">${change.text}</div>
            </div>`;
        div.onclick = () => openDetail(t);
        container.appendChild(div);
    });
}

// ============================================================
// Tab 切换
// ============================================================
function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.market-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');

    // 隐藏搜索结果，显示列表
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('tokenList').style.display = '';

    loadTokenList();
}

// ============================================================
// 搜索
// ============================================================
function handleSearch() {
    clearTimeout(searchTimeout);
    const q = document.getElementById('searchInput').value.trim();

    if (!q) {
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('tokenList').style.display = '';
        return;
    }

    searchTimeout = setTimeout(async () => {
        const container = document.getElementById('searchResults');
        container.style.display = '';
        document.getElementById('tokenList').style.display = 'none';
        container.innerHTML = '<div class="loading-placeholder"><div class="loading-spinner"></div>搜索中...</div>';

        try {
            // 搜索多条链
            const results = await OKX_API.searchTokens(q, '196,1,56');
            if (!results || results.length === 0) {
                container.innerHTML = '<div class="loading-placeholder">未找到匹配的代币</div>';
                return;
            }
            renderTokenList.call(null, results);
            // 搜索结果渲染到 searchResults 容器
            container.innerHTML = document.getElementById('tokenList').innerHTML;
            document.getElementById('tokenList').style.display = 'none';

            // 重新绑定点击事件
            container.querySelectorAll('.token-row').forEach((row, idx) => {
                row.onclick = () => openDetail(results[idx]);
            });
        } catch (e) {
            container.innerHTML = '<div class="loading-placeholder">搜索失败</div>';
        }
    }, 400);
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('tokenList').style.display = '';
}

// ============================================================
// 详情弹层
// ============================================================
async function openDetail(token) {
    currentDetailToken = token;
    const addr = token.tokenContractAddress;
    const chain = token.chainIndex || '196';

    // 基础信息先填充
    const iconImg = document.getElementById('detailIconImg');
    const iconText = document.getElementById('detailIconText');
    if (token.tokenLogoUrl) {
        iconImg.src = token.tokenLogoUrl;
        iconImg.style.display = '';
        iconText.style.display = 'none';
    } else {
        iconImg.style.display = 'none';
        iconText.style.display = '';
        iconText.textContent = (token.tokenSymbol || '?')[0];
    }

    document.getElementById('detailSymbol').textContent = token.tokenSymbol || '--';
    document.getElementById('detailName').textContent = token.tokenName || token.tokenFullName || '--';
    document.getElementById('detailPrice').innerHTML = OKX_API.formatPriceHtml(token.price);

    const change = OKX_API.formatChange(token.change);
    const chgEl = document.getElementById('detailChange');
    chgEl.textContent = change.text;
    chgEl.className = 'change-badge ' + change.class;

    document.getElementById('detailVol').textContent = OKX_API.formatVolume(token.volume24H || token.volume || '0');
    document.getElementById('detailMcap').textContent = OKX_API.formatMarketCap(token.marketCap || '0');
    document.getElementById('detailChain').textContent = OKX_API.getChainName(chain);
    document.getElementById('detailHolders').textContent = '--';
    document.getElementById('detailHigh').textContent = '--';
    document.getElementById('detailLow').textContent = '--';

    // 自选状态
    const isWatched = watchlist.includes(token.tokenSymbol);
    document.getElementById('detailStar').textContent = isWatched ? '⭐' : '☆';

    // 重置 tab
    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.detail-tab').classList.add('active');
    document.getElementById('holdersSection').style.display = '';
    document.getElementById('tradesSection').style.display = 'none';

    // 清空持有者和交易
    document.getElementById('holdersSection').innerHTML = '<div class="loading-placeholder" style="padding:20px;"><div class="loading-spinner"></div>加载持有者数据...</div>';
    document.getElementById('tradesSection').innerHTML = '<div class="loading-placeholder" style="padding:20px;"><div class="loading-spinner"></div>加载交易活动...</div>';

    // 显示弹层
    document.getElementById('detailOverlay').classList.add('active');
    document.getElementById('detailSheet').classList.add('active');

    // 异步加载详情数据
    if (addr) {
        loadDetailData(addr, chain);
    }
}

async function loadDetailData(addr, chain) {
    try {
        // 并行加载交易信息、持有者、交易活动
        const [priceInfo, holders, trades] = await Promise.all([
            OKX_API.getTokenPriceInfo(addr, chain),
            OKX_API.getTokenHolders(addr, chain),
            OKX_API.getTokenTrades(addr, chain, 20)
        ]);

        // 更新交易信息（priceInfo 现在直接返回对象而非数组）
        if (priceInfo) {
            const pi = priceInfo;
            document.getElementById('detailPrice').innerHTML = OKX_API.formatPriceHtml(pi.price);
            document.getElementById('detailVol').textContent = OKX_API.formatVolume(pi.volume24H || '0');
            document.getElementById('detailMcap').textContent = OKX_API.formatMarketCap(pi.marketCap || '0');
            document.getElementById('detailHolders').textContent = OKX_API.formatHolders(pi.holders || '0');
            document.getElementById('detailHigh').textContent = OKX_API.formatPrice(pi.maxPrice || '0');
            document.getElementById('detailLow').textContent = OKX_API.formatPrice(pi.minPrice || '0');

            const change24 = OKX_API.formatChange(pi.priceChange24H);
            const chgEl = document.getElementById('detailChange');
            chgEl.textContent = change24.text + ' 24h';
            chgEl.className = 'change-badge ' + change24.class;
        }

        // 渲染持有者
        renderHolders(holders);

        // 渲染交易活动
        renderTrades(trades);

    } catch (e) {
        console.error('加载详情失败:', e);
    }
}

function renderHolders(holders) {
    const container = document.getElementById('holdersSection');
    if (!holders || holders.length === 0) {
        container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:0.78rem;">暂无持有者数据</div>';
        return;
    }

    let html = '<div class="holders-title">Top 持有者</div>';
    holders.slice(0, 10).forEach((h, i) => {
        const addr = OKX_API.shortAddress(h.holderWalletAddress);
        const pct = parseFloat(h.holdPercent || 0).toFixed(2);
        const tag = h.tag ? `<span style="font-size:0.6rem;background:rgba(124,58,237,0.1);color:#7C3AED;padding:1px 5px;border-radius:4px;margin-left:4px;">${h.tag}</span>` : '';
        html += `
            <div class="holder-row">
                <div>
                    <span style="color:#94A3B8;font-size:0.68rem;margin-right:6px;">#${i + 1}</span>
                    <span class="holder-addr">${addr}</span>${tag}
                </div>
                <span class="holder-pct">${pct}%</span>
            </div>`;
    });
    container.innerHTML = html;
}

function renderTrades(trades) {
    const container = document.getElementById('tradesSection');
    if (!trades || trades.length === 0) {
        container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:0.78rem;">暂无交易活动</div>';
        return;
    }

    let html = '<div class="trades-title">最近交易</div>';
    trades.slice(0, 15).forEach(t => {
        const isBuy = (t.type || '').toLowerCase() === 'buy';
        const typeClass = isBuy ? 'buy' : 'sell';
        const typeText = isBuy ? '买入' : '卖出';
        const price = OKX_API.formatPrice(t.price);
        const vol = OKX_API.formatVolume(t.volume);
        const time = OKX_API.formatTime(t.tradeTime);
        const dex = t.dexName || '--';

        html += `
            <div class="trade-row">
                <div style="display:flex;align-items:center;gap:8px;">
                    <span class="trade-type ${typeClass}">${typeText}</span>
                    <span class="trade-price">${price}</span>
                </div>
                <div class="trade-info">
                    <div>${vol}</div>
                    <div style="font-size:0.65rem;">${dex} · ${time}</div>
                </div>
            </div>`;
    });
    container.innerHTML = html;
}

// ============================================================
// 详情 Tab 切换
// ============================================================
function switchDetailTab(tab, el) {
    document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');

    document.getElementById('holdersSection').style.display = tab === 'holders' ? '' : 'none';
    document.getElementById('tradesSection').style.display = tab === 'trades' ? '' : 'none';
}

function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('active');
    document.getElementById('detailSheet').classList.remove('active');
}

function toggleWatchlist() {
    if (!currentDetailToken) return;
    const symbol = currentDetailToken.tokenSymbol;
    const idx = watchlist.indexOf(symbol);
    if (idx >= 0) {
        watchlist.splice(idx, 1);
        document.getElementById('detailStar').textContent = '☆';
    } else {
        watchlist.push(symbol);
        document.getElementById('detailStar').textContent = '⭐';
    }
    localStorage.setItem('watchlist', JSON.stringify(watchlist));
}

// ============================================================
// 启动
// ============================================================
initMarket();

// 每 60 秒自动刷新
setInterval(() => {
    loadOverview();
    if (currentTab !== 'watchlist') loadTokenList();
}, 60000);
</script>
