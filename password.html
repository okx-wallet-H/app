<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>海豚社区 - 修改密码</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0 20px;
        }
        .back-btn {
            width: 40px; height: 40px;
            border-radius: 14px;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(45,27,105,0.08);
            flex-shrink: 0;
        }
        .back-btn svg { width: 18px; height: 18px; stroke: #2D1B69; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        .page-title { font-size: 1.15rem; font-weight: 800; color: #2D1B69; }

        /* 安全图标区 */
        .security-hero {
            text-align: center;
            padding: 20px 0 28px;
        }
        .security-icon-wrap {
            width: 80px; height: 80px;
            border-radius: 28px;
            background: linear-gradient(135deg, #4C1D95, #7C3AED, #A855F7);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 16px 40px rgba(124,58,237,0.3);
        }
        .security-icon-wrap svg { width: 36px; height: 36px; stroke: white; fill: none; stroke-width: 1.8; stroke-linecap: round; }
        .security-title { font-size: 1.1rem; font-weight: 800; color: #2D1B69; margin-bottom: 6px; }
        .security-sub { font-size: 0.78rem; color: var(--text-muted); }

        /* 表单卡 */
        .form-card {
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.9);
            border-radius: 28px;
            padding: 24px 20px;
            margin-bottom: 16px;
            box-shadow: 0 6px 24px rgba(45,27,105,0.07);
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group:last-child { margin-bottom: 0; }
        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #2D1B69;
            margin-bottom: 8px;
            display: block;
        }
        .form-input-wrap {
            background: rgba(248,247,255,0.9);
            border: 1.5px solid rgba(124,58,237,0.1);
            border-radius: 18px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input-wrap:focus-within {
            border-color: rgba(124,58,237,0.4);
            box-shadow: 0 0 0 4px rgba(124,58,237,0.06);
        }
        .form-input-wrap.error {
            border-color: rgba(239,68,68,0.4);
            box-shadow: 0 0 0 4px rgba(239,68,68,0.06);
        }
        .form-input-wrap.success {
            border-color: rgba(16,185,129,0.4);
            box-shadow: 0 0 0 4px rgba(16,185,129,0.06);
        }
        .form-input-icon { flex-shrink: 0; }
        .form-input-icon svg { width: 18px; height: 18px; stroke: #94A3B8; fill: none; stroke-width: 2; stroke-linecap: round; }
        .form-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.95rem;
            font-weight: 600;
            color: #2D1B69;
            font-family: 'SF Mono', monospace;
            letter-spacing: 1px;
        }
        .form-input::placeholder { color: rgba(45,27,105,0.25); font-family: system-ui; letter-spacing: 0; }
        .toggle-eye {
            cursor: pointer;
            flex-shrink: 0;
        }
        .toggle-eye svg { width: 18px; height: 18px; stroke: #94A3B8; fill: none; stroke-width: 2; stroke-linecap: round; }
        .form-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
            padding-left: 4px;
        }
        .form-hint.error { color: #EF4444; }
        .form-hint.success { color: #10B981; }

        /* 密码强度条 */
        .strength-wrap {
            margin-top: 10px;
        }
        .strength-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .strength-label span:first-child { color: var(--text-muted); }
        .strength-bars {
            display: flex;
            gap: 4px;
        }
        .strength-bar {
            flex: 1;
            height: 4px;
            border-radius: 40px;
            background: rgba(124,58,237,0.08);
            transition: background 0.3s;
        }
        .strength-bar.weak { background: #EF4444; }
        .strength-bar.medium { background: #F59E0B; }
        .strength-bar.strong { background: #10B981; }

        /* 密码要求 */
        .pwd-requirements {
            background: rgba(248,247,255,0.8);
            border-radius: 18px;
            padding: 14px 16px;
            margin-top: 12px;
        }
        .pwd-req-title { font-size: 0.75rem; font-weight: 700; color: #2D1B69; margin-bottom: 10px; }
        .pwd-req-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.73rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .pwd-req-item:last-child { margin-bottom: 0; }
        .req-dot {
            width: 16px; height: 16px;
            border-radius: 50%;
            border: 1.5px solid rgba(124,58,237,0.2);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .req-dot.met {
            border-color: #10B981;
            background: rgba(16,185,129,0.1);
        }
        .req-dot.met::after {
            content: '';
            width: 6px; height: 4px;
            border-left: 1.5px solid #10B981;
            border-bottom: 1.5px solid #10B981;
            transform: rotate(-45deg) translateY(-1px);
        }
        .pwd-req-item.met { color: #10B981; }

        /* 确认按钮 */
        .confirm-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4C1D95, #7C3AED, #A855F7);
            border: none;
            border-radius: 22px;
            font-size: 1rem;
            font-weight: 800;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(124,58,237,0.3);
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .confirm-btn:active { transform: scale(0.98); }
        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 安全提示 */
        .security-tips {
            background: rgba(124,58,237,0.04);
            border: 1px solid rgba(124,58,237,0.08);
            border-radius: 20px;
            padding: 16px 18px;
            margin-bottom: 16px;
        }
        .security-tips-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #2D1B69;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .security-tips-title svg { width: 14px; height: 14px; stroke: var(--primary); fill: none; stroke-width: 2; }
        .security-tip-item {
            font-size: 0.72rem;
            color: var(--text-muted);
            padding: 3px 0;
            padding-left: 12px;
            position: relative;
        }
        .security-tip-item::before { content: '·'; position: absolute; left: 0; color: var(--primary); font-weight: 800; }

        /* Toast */
        #pwdToast {
            position: fixed;
            bottom: 110px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(45,27,105,0.92);
            color: white;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 999;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="ambient-bg"></div>
<div class="container">

    <!-- 顶部导航 -->
    <div class="page-header">
        <div class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="page-title">修改密码</div>
    </div>

    <!-- 安全图标区 -->
    <div class="security-hero">
        <div class="security-icon-wrap">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <div class="security-title">账户安全保护</div>
        <div class="security-sub">定期修改密码可有效保护您的账户安全</div>
    </div>

    <!-- 表单 -->
    <div class="form-card">
        <!-- 当前密码 -->
        <div class="form-group">
            <label class="form-label">当前密码</label>
            <div class="form-input-wrap" id="currentWrap">
                <div class="form-input-icon">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                </div>
                <input class="form-input" id="currentPwd" type="password" placeholder="请输入当前密码" oninput="validateCurrent()">
                <div class="toggle-eye" onclick="togglePwd('currentPwd', this)">
                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
            <div class="form-hint" id="currentHint"></div>
        </div>

        <!-- 新密码 -->
        <div class="form-group">
            <label class="form-label">新密码</label>
            <div class="form-input-wrap" id="newWrap">
                <div class="form-input-icon">
                    <svg viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                </div>
                <input class="form-input" id="newPwd" type="password" placeholder="请输入新密码" oninput="validateNew()">
                <div class="toggle-eye" onclick="togglePwd('newPwd', this)">
                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
            <!-- 密码强度 -->
            <div class="strength-wrap" id="strengthWrap" style="display:none;">
                <div class="strength-label">
                    <span>密码强度</span>
                    <span id="strengthText" style="color:var(--text-muted);">—</span>
                </div>
                <div class="strength-bars">
                    <div class="strength-bar" id="sb1"></div>
                    <div class="strength-bar" id="sb2"></div>
                    <div class="strength-bar" id="sb3"></div>
                    <div class="strength-bar" id="sb4"></div>
                </div>
            </div>
            <!-- 密码要求 -->
            <div class="pwd-requirements" id="pwdReqs" style="display:none;">
                <div class="pwd-req-title">密码要求</div>
                <div class="pwd-req-item" id="req-len"><div class="req-dot"></div>至少 8 个字符</div>
                <div class="pwd-req-item" id="req-upper"><div class="req-dot"></div>包含大写字母</div>
                <div class="pwd-req-item" id="req-num"><div class="req-dot"></div>包含数字</div>
                <div class="pwd-req-item" id="req-special"><div class="req-dot"></div>包含特殊字符（推荐）</div>
            </div>
        </div>

        <!-- 确认新密码 -->
        <div class="form-group">
            <label class="form-label">确认新密码</label>
            <div class="form-input-wrap" id="confirmWrap">
                <div class="form-input-icon">
                    <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </div>
                <input class="form-input" id="confirmPwd" type="password" placeholder="请再次输入新密码" oninput="validateConfirm()">
                <div class="toggle-eye" onclick="togglePwd('confirmPwd', this)">
                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
            <div class="form-hint" id="confirmHint"></div>
        </div>
    </div>

    <!-- 安全提示 -->
    <div class="security-tips">
        <div class="security-tips-title">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            安全建议
        </div>
        <div class="security-tip-item">使用字母、数字和特殊字符的组合</div>
        <div class="security-tip-item">避免使用生日、电话等个人信息</div>
        <div class="security-tip-item">不要在多个平台使用相同密码</div>
        <div class="security-tip-item">建议每 3 个月更换一次密码</div>
    </div>

    <button class="confirm-btn" id="submitBtn" onclick="submitPassword()">确认修改密码</button>

    <div style="height: 100px;"></div>
</div>

<div id="pwdToast"></div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item"><div class="nav-icon">🏠</div><span>首页</span></a>
    <a href="stake.html" class="nav-item"><div class="nav-icon">💎</div><span>质押</span></a>
    <a href="contest.html" class="nav-item"><div class="nav-icon">🏆</div><span>交易赛</span></a>
    <a href="im.html" class="nav-item"><div class="nav-icon">💬</div><span>IM</span></a>
    <a href="wallet.html" class="nav-item"><div class="nav-icon">👛</div><span>钱包</span></a>
</div>

<script src="common.js?v=20260325"></script>
<script src="nav.js"></script>
<script>
function togglePwd(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    const svg = btn.querySelector('svg');
    if (isHidden) {
        svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
        svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
}

function validateCurrent() {
    const val = document.getElementById('currentPwd').value;
    const wrap = document.getElementById('currentWrap');
    const hint = document.getElementById('currentHint');
    if (val.length === 0) {
        wrap.className = 'form-input-wrap';
        hint.textContent = '';
        hint.className = 'form-hint';
    } else if (val.length < 6) {
        wrap.className = 'form-input-wrap error';
        hint.textContent = '密码长度不足';
        hint.className = 'form-hint error';
    } else {
        wrap.className = 'form-input-wrap success';
        hint.textContent = '✓ 验证通过';
        hint.className = 'form-hint success';
    }
}

function validateNew() {
    const val = document.getElementById('newPwd').value;
    const wrap = document.getElementById('newWrap');
    const strengthWrap = document.getElementById('strengthWrap');
    const pwdReqs = document.getElementById('pwdReqs');

    if (val.length === 0) {
        wrap.className = 'form-input-wrap';
        strengthWrap.style.display = 'none';
        pwdReqs.style.display = 'none';
        return;
    }

    strengthWrap.style.display = 'block';
    pwdReqs.style.display = 'block';

    // 检查各项要求
    const hasLen = val.length >= 8;
    const hasUpper = /[A-Z]/.test(val);
    const hasNum = /[0-9]/.test(val);
    const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(val);

    updateReq('req-len', hasLen);
    updateReq('req-upper', hasUpper);
    updateReq('req-num', hasNum);
    updateReq('req-special', hasSpecial);

    // 计算强度
    const score = [hasLen, hasUpper, hasNum, hasSpecial].filter(Boolean).length;
    updateStrength(score);

    if (score >= 3 && hasLen) {
        wrap.className = 'form-input-wrap success';
    } else if (val.length > 0) {
        wrap.className = 'form-input-wrap';
    }

    validateConfirm();
}

function updateReq(id, met) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('met', met);
    el.querySelector('.req-dot').classList.toggle('met', met);
}

function updateStrength(score) {
    const bars = ['sb1','sb2','sb3','sb4'];
    const labels = ['', '弱', '中等', '强', '非常强'];
    const colors = ['', 'weak', 'medium', 'strong', 'strong'];
    const textColors = ['', '#EF4444', '#F59E0B', '#10B981', '#10B981'];

    bars.forEach((id, i) => {
        const bar = document.getElementById(id);
        bar.className = 'strength-bar';
        if (i < score) bar.classList.add(colors[score]);
    });

    const text = document.getElementById('strengthText');
    text.textContent = labels[score] || '—';
    text.style.color = textColors[score] || 'var(--text-muted)';
}

function validateConfirm() {
    const newVal = document.getElementById('newPwd').value;
    const confirmVal = document.getElementById('confirmPwd').value;
    const wrap = document.getElementById('confirmWrap');
    const hint = document.getElementById('confirmHint');

    if (confirmVal.length === 0) {
        wrap.className = 'form-input-wrap';
        hint.textContent = '';
        hint.className = 'form-hint';
        return;
    }

    if (newVal === confirmVal) {
        wrap.className = 'form-input-wrap success';
        hint.textContent = '✓ 两次密码一致';
        hint.className = 'form-hint success';
    } else {
        wrap.className = 'form-input-wrap error';
        hint.textContent = '两次密码不一致，请重新输入';
        hint.className = 'form-hint error';
    }
}

function submitPassword() {
    const current = document.getElementById('currentPwd').value;
    const newPwd = document.getElementById('newPwd').value;
    const confirm = document.getElementById('confirmPwd').value;

    if (!current || current.length < 6) { showToast('请输入正确的当前密码'); return; }
    if (!newPwd || newPwd.length < 8) { showToast('新密码至少需要 8 位'); return; }
    if (newPwd !== confirm) { showToast('两次密码输入不一致'); return; }
    if (current === newPwd) { showToast('新密码不能与当前密码相同'); return; }

    showToast('密码修改成功！');
    setTimeout(() => history.back(), 1500);
}

let toastTimer;
function showToast(msg) {
    const el = document.getElementById('pwdToast');
    el.textContent = msg;
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateX(-50%) translateY(20px)';
    }, 2200);
}
</script>
</body>
</html>
